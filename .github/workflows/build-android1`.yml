name: Build Android App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor Android
        run: npm install @capacitor/android@latest

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Generate upload keystore
        run: |
          keytool -genkeypair -v -storetype PKCS12 -keystore android/app/upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass android -keypass android -dname "CN=Rental Waivers, OU=Mobile, O=Rental Waivers, L=Unknown, ST=Unknown, C=US"

      - name: Configure Gradle signing
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("upload-keystore.jks")
                      storePassword "android"
                      keyAlias "upload"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build signed release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Verify AAB signature
        run: |
          jarsigner -verify android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: RentalWaivers-Android
          path: android/app/build/outputs/bundle/release/*.aab
          compression-level: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v1.0.${{ github.run_number }}
          name: Android Build ${{ github.run_number }}
          files: android/app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: truename: Build Android App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor Android
        run: npm install @capacitor/android@latest

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Generate upload keystore
        run: |
          keytool -genkeypair -v -storetype PKCS12 -keystore upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass android -keypass android -dname "CN=Rental Waivers, OU=Mobile, O=Rental Waivers, L=Unknown, ST=Unknown, C=US"

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Sign AAB with upload key
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore upload-keystore.jks -storepass android -keypass android android/app/build/outputs/bundle/release/app-release.aab upload

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: RentalWaivers-Android
          path: android/app/build/outputs/bundle/release/*.aab
          compression-level: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v1.0.${{ github.run_number }}
          name: Android Build ${{ github.run_number }}
          files: android/app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: true
